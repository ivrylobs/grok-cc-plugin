<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 680" width="680" height="680" role="img" aria-label="grok-cc proof scorecard: warm spawn ~1500x faster (2205ms to 1.4ms), a ~16s autonomous bug fix, a worker that asked for the secret key instead of inventing it, and 48 offline plus 48 live tests with 0 failures">
  <title>grok-cc proof scorecard</title>
  <desc>Four measured results in a 2 by 2 grid: warm-pool spawn ~1500x faster (2205ms to 1.4ms); a ~16 second autonomous bug fix with zero human touches under grip leash; a worker that asked for the secret key instead of inventing it; and 48 offline plus 48 live tests with 0 failures.</desc>

  <rect width="680" height="680" fill="#E9E2D0"/>

  <g stroke="#C65E39" stroke-width="1" opacity="0.5">
    <line x1="340" y1="150" x2="340" y2="530"/>
    <line x1="70" y1="340" x2="610" y2="340"/>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" text-anchor="middle">

    <!-- top-left: warm pool -->
    <text x="190" y="245" fill="#111111" font-size="52" font-weight="800" letter-spacing="-0.02em">~1500&#215;</text>
    <text x="190" y="280" fill="#111111" font-size="16" font-weight="600">faster repeat spawn</text>
    <text x="190" y="303" fill="#C65E39" font-size="16" font-weight="700">2205 ms &#8594; 1.4 ms</text>
    <text x="190" y="323" fill="#6B6255" font-size="13">warm pool, real grok</text>

    <!-- top-right: autonomous fix -->
    <text x="490" y="245" fill="#111111" font-size="52" font-weight="800" letter-spacing="-0.02em">~16 s</text>
    <text x="490" y="280" fill="#111111" font-size="16" font-weight="600">autonomous bug fix</text>
    <text x="490" y="303" fill="#6B6255" font-size="13">zero human touches</text>
    <text x="490" y="322" fill="#6B6255" font-size="13">--grip leash</text>

    <!-- bottom-left: asked, didn't invent -->
    <text x="190" y="430" fill="#111111" font-size="42" font-weight="800" letter-spacing="-0.02em">it asked</text>
    <text x="190" y="465" fill="#111111" font-size="16" font-weight="600">for the secret API key</text>
    <text x="190" y="487" fill="#C65E39" font-size="15" font-weight="700">instead of inventing one</text>

    <!-- bottom-right: tests -->
    <text x="490" y="430" fill="#111111" font-size="52" font-weight="800" letter-spacing="-0.02em">48 + 48</text>
    <text x="490" y="465" fill="#111111" font-size="16" font-weight="600">offline + live tests</text>
    <text x="490" y="487" fill="#C65E39" font-size="16" font-weight="700">0 failures</text>
  </g>
</svg>
